{% extends "layout.html" %}
{% block title %}Trash{% endblock %}
{% block content %}

<div class="view-header">
    <div class="view-header-left">
        <h1 class="view-title">🗑 Trash</h1>
        <span class="view-count">{{ notes|length }} items</span>
    </div>
</div>

<div class="trash-list">
    {% for note in notes %}
    <div class="trash-row">
        <div class="trash-info">
            <div class="trash-title">{{ note.title }}</div>
            <div class="trash-meta">Deleted {{ note.deleted_at }}</div>
        </div>
        <div class="trash-actions">
            <form method="post" action="/note/{{ note.id }}/restore" style="display:inline">
                <button class="btn-outline btn-sm">Restore</button>
            </form>
            <form method="post" action="/note/{{ note.id }}/delete-permanent" style="display:inline"
                  onsubmit="return confirm('Permanently delete this note? This cannot be undone.')">
                <button class="btn-danger-outline btn-sm">Delete Forever</button>
            </form>
        </div>
    </div>
    {% endfor %}
    {% if not notes %}
    <div class="empty-state">
        <div class="empty-icon">🗑</div>
        <p>Trash is empty.</p>
    </div>
    {% endif %}
</div>

{% endblock %}
